name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  IMAGE_NAME: magenta-mause/cosy-domain-provider-frontend

jobs:
  build-staging:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
            VITE_STAGING_AUTH_ENABLED=true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:staging-${{ env.SHORT_SHA }}
            ghcr.io/${{ env.IMAGE_NAME }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-prod:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute version tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build and push prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY_PROD }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-staging:
    needs: build-staging
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Compute short SHA
        run: echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Clone deployment repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/magenta-mause/cosy-domain-provider-deployment.git deploy-repo

      - name: Update frontend image tag
        run: |
          cd deploy-repo/overlays/staging
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAME }}:staging-${{ env.SHORT_SHA }}

      - name: Commit and push
        run: |
          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || git commit -am "ci: update frontend image to staging-${{ env.SHORT_SHA }}"
          git push

  update-prod:
    needs: build-prod
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Clone deployment repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/magenta-mause/cosy-domain-provider-deployment.git deploy-repo

      - name: Update frontend image tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd deploy-repo/overlays/prod
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}

      - name: Commit and push
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || git commit -am "ci: update frontend image to ${VERSION}"
          git push
